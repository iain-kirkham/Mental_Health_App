spring.application.name=adhd-focus-companion-backend

# Database Configuration
# Supports local, Docker, and Heroku Postgres (JDBC_DATABASE_* env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/mental_planner}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:${DB_USERNAME}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:${DB_PASSWORD}}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.port=${PORT:8080}

# Clerk Authentication Configuration
# Can be overridden via environment variables (e.g., for different environments)
clerk.issuer.url=${CLERK_ISSUER_URL:https://renewing-foxhound-89.clerk.accounts.dev}
clerk.jwks.uri=${CLERK_JWKS_URI:https://renewing-foxhound-89.clerk.accounts.dev/.well-known/jwks.json}

# CORS Configuration (allow frontend origin)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
